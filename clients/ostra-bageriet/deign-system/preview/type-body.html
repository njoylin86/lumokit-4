<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Body & UI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ob-bg); }
  .wrap { width: 700px; padding: 28px; box-sizing: border-box; }
  .row { display: grid; grid-template-columns: 130px 1fr; gap: 16px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--ob-border); }
  .row:last-child { border-bottom: none; }
  .label { font-family: var(--ob-font-sans); font-size: 11px; color: var(--ob-fg-subtle); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="label">Eyebrow · 12</div><div class="ob-eyebrow">Färskt idag</div></div>
    <div class="row"><div class="label">H1 · 36</div><div class="ob-h1">Catering till kontoret</div></div>
    <div class="row"><div class="label">H2 · 28</div><div class="ob-h2">Mezé för fyra personer</div></div>
    <div class="row"><div class="label">Lede · 18</div><div class="ob-lede">Bakat varje morgon, serverat med en macka och en kopp kaffe.</div></div>
    <div class="row"><div class="label">Body · 16</div><div class="ob-body">Vi bakar varje morgon på Östra station. Kom förbi innan nio om du vill ha varma frallor.</div></div>
    <div class="row"><div class="label">Caption · 14</div><div class="ob-caption">Inkluderar bröd & läsk 33cl</div></div>
  </div>
</body>
</html>
