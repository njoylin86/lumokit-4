<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ob-bg); font-family: var(--ob-font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; }
  .row { display: grid; grid-template-columns: 50px 100px 1fr; align-items: center; gap: 12px; padding: 6px 0; }
  .name { font-size: 12px; font-weight: 600; color: var(--ob-fg); }
  .px { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--ob-fg-subtle); }
  .bar { height: 14px; background: var(--ob-skog-300); border-radius: 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="name">s-1</div><div class="px">4 px</div><div class="bar" style="width: 4px;"></div></div>
    <div class="row"><div class="name">s-2</div><div class="px">8 px</div><div class="bar" style="width: 8px;"></div></div>
    <div class="row"><div class="name">s-3</div><div class="px">12 px</div><div class="bar" style="width: 12px;"></div></div>
    <div class="row"><div class="name">s-4</div><div class="px">16 px</div><div class="bar" style="width: 16px;"></div></div>
    <div class="row"><div class="name">s-6</div><div class="px">24 px</div><div class="bar" style="width: 24px;"></div></div>
    <div class="row"><div class="name">s-8</div><div class="px">32 px</div><div class="bar" style="width: 32px;"></div></div>
    <div class="row"><div class="name">s-12</div><div class="px">48 px</div><div class="bar" style="width: 48px;"></div></div>
    <div class="row"><div class="name">s-16</div><div class="px">64 px</div><div class="bar" style="width: 64px;"></div></div>
    <div class="row"><div class="name">s-20</div><div class="px">80 px</div><div class="bar" style="width: 80px;"></div></div>
    <div class="row"><div class="name">s-24</div><div class="px">96 px</div><div class="bar" style="width: 96px;"></div></div>
  </div>
</body>
</html>
