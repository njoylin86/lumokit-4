<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors · Skog scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ob-bg); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; font-family: var(--ob-font-sans); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .sw { aspect-ratio: 1 / 1.1; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
  .step { font-size: 11px; font-weight: 600; }
  .hex { font-size: 10px; font-variant-numeric: tabular-nums; opacity: 0.85; }
  .light { color: var(--ob-cream); }
  .dark { color: var(--ob-skog-800); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw dark"  style="background:var(--ob-skog-50)"><span class="step">50</span><span class="hex">#EEF4EC</span></div>
      <div class="sw dark"  style="background:var(--ob-skog-100)"><span class="step">100</span><span class="hex">#D6E4D0</span></div>
      <div class="sw dark"  style="background:var(--ob-skog-200)"><span class="step">200</span><span class="hex">#A9C49E</span></div>
      <div class="sw light" style="background:var(--ob-skog-300)"><span class="step">300</span><span class="hex">#7CA46E</span></div>
      <div class="sw light" style="background:var(--ob-skog-400)"><span class="step">400</span><span class="hex">#5A8A4D</span></div>
      <div class="sw light" style="background:var(--ob-skog-500)"><span class="step">500</span><span class="hex">#3F6E36</span></div>
      <div class="sw light" style="background:var(--ob-skog-600)"><span class="step">600</span><span class="hex">#2F5728</span></div>
      <div class="sw light" style="background:var(--ob-skog-700)"><span class="step">700</span><span class="hex">#234020</span></div>
    </div>
  </div>
</body>
</html>
