<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ob-bg); }
  .wrap { width: 700px; padding: 18px; box-sizing: border-box; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .img { aspect-ratio: 1 / 1; border-radius: var(--ob-r-md); background-size: cover; background-position: center; box-shadow: var(--ob-shadow-1); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="img" style="background-image:url('../assets/food/breads.jpg')"></div>
    <div class="img" style="background-image:url('../assets/food/sub-sandwich.jpg')"></div>
    <div class="img" style="background-image:url('../assets/food/coffee-rose.png')"></div>
    <div class="img" style="background-image:url('../assets/food/kanelbulle.png')"></div>
    <div class="img" style="background-image:url('../assets/food/meze-platter.png')"></div>
    <div class="img" style="background-image:url('../assets/food/grilled-chicken-platter.png')"></div>
    <div class="img" style="background-image:url('../assets/food/kebab-bowl.png')"></div>
    <div class="img" style="background-image:url('../assets/food/iced-latte.png')"></div>
  </div>
</body>
</html>
