<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Menu cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ob-bg); font-family: var(--ob-font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--ob-paper); border: 1px solid var(--ob-border); border-radius: var(--ob-r-md); overflow: hidden; box-shadow: var(--ob-shadow-2); display: flex; flex-direction: column; }
  .card .img { aspect-ratio: 16 / 10; background-size: cover; background-position: center; position: relative; }
  .card .chip { position: absolute; top: 10px; left: 10px; background: var(--ob-skog-500); color: #fff; padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .card .body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; }
  .card .title { font-family: var(--ob-font-display); font-size: 19px; font-weight: 600; color: var(--ob-fg); line-height: 1.15; }
  .card .desc { font-size: 12.5px; color: var(--ob-fg-muted); line-height: 1.4; }
  .card .price-row { display: flex; align-items: baseline; gap: 10px; margin-top: 4px; }
  .price { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 18px; color: var(--ob-fg); }
  .student { font-size: 12px; color: var(--ob-saffran-500); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="img" style="background-image:url('../assets/food/sub-sandwich.jpg')">
        <span class="chip">Färskt idag</span>
      </div>
      <div class="body">
        <div class="title">Italiensk salami ciabatta</div>
        <div class="desc">Mozzarella, ruccola, soltorkade tomater & örtpesto.</div>
        <div class="price-row"><span class="price">80:-</span><span class="student">student 70:-</span></div>
      </div>
    </div>
    <div class="card">
      <div class="img" style="background-image:url('../assets/food/grilled-chicken-platter.png')">
        <span class="chip" style="background: var(--ob-saffran-400);">Stamkund</span>
      </div>
      <div class="body">
        <div class="title">Hälsosallad med kyckling</div>
        <div class="desc">Grillad kycklingfilé, hummus, halloumi, granatäpple & vitlökscreme.</div>
        <div class="price-row"><span class="price">110:-</span><span class="student">student 90:-</span></div>
      </div>
    </div>
  </div>
</body>
</html>
