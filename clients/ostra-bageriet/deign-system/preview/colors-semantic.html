<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors · Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ob-bg); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; font-family: var(--ob-font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item {
    border-radius: 12px;
    padding: 14px;
    height: 100px;
    box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: space-between;
    color: #fff;
  }
  .name { font-weight: 600; font-size: 13px; }
  .role { font-size: 11px; opacity: 0.85; }
  .hex { font-size: 11px; font-variant-numeric: tabular-nums; opacity: 0.85; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="item" style="background:var(--ob-success)"><div><div class="name">Success</div><div class="role">Confirmations</div></div><div class="hex">#4F8A3C</div></div>
      <div class="item" style="background:var(--ob-warning)"><div><div class="name">Warning</div><div class="role">Saffran 400</div></div><div class="hex">#F08420</div></div>
      <div class="item" style="background:var(--ob-danger)"><div><div class="name">Danger</div><div class="role">Granat / Pomegr.</div></div><div class="hex">#B83A2A</div></div>
      <div class="item" style="background:var(--ob-info)"><div><div class="name">Info</div><div class="role">Catering / hours</div></div><div class="hex">#3B6E8A</div></div>
    </div>
  </div>
</body>
</html>
