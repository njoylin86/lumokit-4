<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ob-bg); font-family: var(--ob-font-sans); }
  .wrap { width: 700px; padding: 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: var(--ob-r-md); font-weight: 600; font-size: 15px; border: 0; cursor: pointer; line-height: 1; transition: all .2s cubic-bezier(.32,.72,0,1); }
  .btn-primary { background: var(--ob-skog-500); color: var(--ob-cream); }
  .btn-primary:hover { background: var(--ob-skog-600); }
  .btn-accent { background: var(--ob-saffran-400); color: #fff; box-shadow: var(--ob-shadow-warm); }
  .btn-accent:hover { background: var(--ob-saffran-500); }
  .btn-ghost { background: transparent; color: var(--ob-skog-500); box-shadow: inset 0 0 0 1.5px var(--ob-skog-500); }
  .btn-ghost:hover { background: var(--ob-skog-50); }
  .btn-quiet { background: var(--ob-stone-100); color: var(--ob-fg); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-lg { padding: 16px 26px; font-size: 17px; border-radius: var(--ob-r-lg); }
  .label { font-size: 11px; color: var(--ob-fg-subtle); letter-spacing: 0.06em; text-transform: uppercase; min-width: 90px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="label">Primary</span>
      <button class="btn btn-primary btn-sm">Beställ</button>
      <button class="btn btn-primary">Beställ catering</button>
      <button class="btn btn-primary btn-lg">Beställ catering</button>
    </div>
    <div class="row"><span class="label">Accent</span>
      <button class="btn btn-accent btn-sm">Boka</button>
      <button class="btn btn-accent">Se dagens meny</button>
      <button class="btn btn-accent btn-lg">Se dagens meny</button>
    </div>
    <div class="row"><span class="label">Ghost</span>
      <button class="btn btn-ghost btn-sm">Hitta hit</button>
      <button class="btn btn-ghost">Hitta hit</button>
      <button class="btn btn-quiet">Avbryt</button>
    </div>
  </div>
</body>
</html>
