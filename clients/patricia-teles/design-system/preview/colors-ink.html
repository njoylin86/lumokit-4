<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Color Palette — Ink</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--white); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1.4; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-shadow: var(--shadow-inset); }
  .sw .name { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--blush-600); margin: 0 0 12px; font-weight: 500;}
</style></head>
<body>
  <div class="label">Ink · Type & action</div>
  <div class="row">
    <div class="sw" style="background:#f7f7f7;color:#323232"><div class="name">50</div><div class="hex">f7f7f7</div></div>
    <div class="sw" style="background:#ececec;color:#323232"><div class="name">100</div><div class="hex">ececec</div></div>
    <div class="sw" style="background:#d6d6d6;color:#323232"><div class="name">200</div><div class="hex">d6d6d6</div></div>
    <div class="sw" style="background:#a8a8a8;color:#fff"><div class="name">300</div><div class="hex">a8a8a8</div></div>
    <div class="sw" style="background:#6e6e6e;color:#fff"><div class="name">400</div><div class="hex">6e6e6e</div></div>
    <div class="sw" style="background:#4a4a4a;color:#fff"><div class="name">500</div><div class="hex">4a4a4a</div></div>
    <div class="sw" style="background:#323232;color:#fff"><div class="name">600</div><div class="hex">323232</div></div>
    <div class="sw" style="background:#1f1f1f;color:#fff"><div class="name">700</div><div class="hex">1f1f1f</div></div>
  </div>
</body></html>
