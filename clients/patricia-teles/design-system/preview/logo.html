<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--white); display: flex; flex-direction: column; gap: 18px; align-items: flex-start;}
  .panel { background: var(--blush-50); padding: 24px 28px; width: 100%; box-sizing: border-box; border-radius: var(--radius-sm);}
  .panel.dark { background: var(--ink-700); }
  img { display: block; height: 56px;}
</style></head>
<body>
  <div class="panel"><img src="../assets/logo.svg" alt="Patricia Teles"/></div>
  <div class="panel dark"><img src="../assets/logo.svg" alt="Patricia Teles" style="filter:invert(1);"/></div>
</body></html>
