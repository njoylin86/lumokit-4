<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Type — Pairing in use</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 36px; background: var(--blush-50); }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--blush-600); font-weight: 500; margin-bottom: 14px;}
  h1 { font-family: var(--font-serif); font-weight: 500; font-size: 44px; letter-spacing: -0.02em; color: var(--fg-strong); margin: 0 0 18px; line-height: 1.1; }
  p { font-family: var(--font-sans); font-size: 15px; line-height: 1.7; color: var(--fg); max-width: 56ch; margin: 0; }
</style></head>
<body>
  <div class="eyebrow">Om oss</div>
  <h1>Patricia Teles</h1>
  <p>En modern tandläkarklinik i Stockholm med fokus på estetisk tandvård. Vi strävar alltid efter naturligt vackra resultat &mdash; och tar varje patient på allvar.</p>
</body></html>
