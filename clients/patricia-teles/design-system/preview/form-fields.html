<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--blush-200); font-family: var(--font-sans); }
  .field { margin-bottom: 14px;}
  label { display:block; font-size: 13px; color: var(--fg-strong); font-weight: 400; margin-bottom: 6px;}
  label .req { color: var(--blush-600); }
  input, textarea {
    width: 100%; box-sizing: border-box;
    background: #fff; border: 1px solid transparent;
    padding: 12px 14px; border-radius: var(--radius-sm);
    font-family: var(--font-sans); font-size: 14px; color: var(--fg-strong);
    transition: border-color var(--dur-fast) var(--ease-standard);
  }
  input:focus, textarea:focus { outline:none; border-color: var(--blush-500);}
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px;}
</style></head>
<body>
  <div class="row">
    <div class="field"><label>Förnamn <span class="req">*</span></label><input value="Anna"/></div>
    <div class="field"><label>Efternamn <span class="req">*</span></label><input/></div>
  </div>
  <div class="field"><label>E-post <span class="req">*</span></label><input placeholder="namn@exempel.se"/></div>
</body></html>
