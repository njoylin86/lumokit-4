<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--white); font-family: var(--font-sans);}
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .b { aspect-ratio: 1; background: var(--blush-200); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 10px; box-shadow: var(--shadow-inset);}
  .name { font-size: 11px; font-weight: 600; color: var(--fg-strong);}
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);}
</style></head>
<body>
  <div class="row">
    <div class="b" style="border-radius:2px"><div class="name">xs</div><div class="px">2px</div></div>
    <div class="b" style="border-radius:4px"><div class="name">sm</div><div class="px">4px</div></div>
    <div class="b" style="border-radius:8px"><div class="name">md</div><div class="px">8px</div></div>
    <div class="b" style="border-radius:14px"><div class="name">lg</div><div class="px">14px</div></div>
    <div class="b" style="border-radius:24px"><div class="name">xl</div><div class="px">24px</div></div>
    <div class="b" style="border-radius:999px"><div class="name">pill</div><div class="px">999px</div></div>
  </div>
</body></html>
