<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--white); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(3, auto); gap: 14px 18px; align-items: center; justify-content: start;}
  .btn {
    font-family: var(--font-sans);
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.22em;
    padding: 14px 28px; border: 1px solid transparent;
    border-radius: var(--radius-sm); cursor: pointer;
    transition: all var(--dur-fast) var(--ease-standard);
  }
  .primary { background: var(--ink-700); color: #fff; }
  .primary.hover { background: var(--ink-900); }
  .ghost { background: transparent; color: var(--ink-700); border-color: var(--ink-700); }
  .ghost.hover { background: var(--blush-50); }
  .link { background:transparent;color:var(--ink-700);border:none;text-decoration:underline;text-underline-offset:6px;text-decoration-color:var(--blush-400);padding:14px 4px;}
  .lbl { font-size: 11px; color: var(--fg-muted); letter-spacing: 0.04em; }
</style></head>
<body>
  <div class="grid">
    <button class="btn primary">Boka tid</button>
    <button class="btn primary hover">Boka tid</button>
    <span class="lbl">Primary · rest / hover</span>
    <button class="btn ghost">Läs mer</button>
    <button class="btn ghost hover">Läs mer</button>
    <span class="lbl">Ghost · rest / hover</span>
    <button class="btn link">Läs våra recensioner</button>
    <span></span>
    <span class="lbl">Link</span>
  </div>
</body></html>
