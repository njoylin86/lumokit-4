<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Treatment cards</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--white); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;}
  .card {
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.18em;
    text-align: center; padding: 12px;
    box-shadow: var(--shadow-inset);
    transition: transform var(--dur-base) var(--ease-out);
  }
  .c1 { background: linear-gradient(135deg, #b9d9cf, #88b9aa); }
  .c2 { background: linear-gradient(135deg, #b8cfe0, #7da4bf); }
  .c3 { background: linear-gradient(135deg, #d6c2d9, #a988b1); }
  .c4 { background: linear-gradient(135deg, #f4b6bf, #e08d99); }
</style></head>
<body>
  <div class="grid">
    <div class="card c1">Allmän<br>tandvård</div>
    <div class="card c2">Invisalign</div>
    <div class="card c3">Tand-<br>blekning</div>
    <div class="card c4">Akut-<br>tandvård</div>
  </div>
</body></html>
