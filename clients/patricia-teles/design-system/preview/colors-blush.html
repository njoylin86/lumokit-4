<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Color Palette — Blush</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--white); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1.4; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-shadow: var(--shadow-inset); }
  .sw .name { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--blush-600); margin: 0 0 12px; font-weight: 500;}
</style></head>
<body>
  <div class="label">Blush · Primary palette</div>
  <div class="row">
    <div class="sw" style="background:#fdf5f8;color:#323232"><div class="name">50</div><div class="hex">fdf5f8</div></div>
    <div class="sw" style="background:#fbeaf0;color:#323232"><div class="name">100</div><div class="hex">fbeaf0</div></div>
    <div class="sw" style="background:#f6d7e0;color:#323232"><div class="name">200</div><div class="hex">f6d7e0</div></div>
    <div class="sw" style="background:#efbecc;color:#323232"><div class="name">300</div><div class="hex">efbecc</div></div>
    <div class="sw" style="background:#e29db0;color:#fff"><div class="name">400</div><div class="hex">e29db0</div></div>
    <div class="sw" style="background:#d4889e;color:#fff"><div class="name">500</div><div class="hex">d4889e</div></div>
    <div class="sw" style="background:#b56a82;color:#fff"><div class="name">600</div><div class="hex">b56a82</div></div>
    <div class="sw" style="background:#8a4f64;color:#fff"><div class="name">700</div><div class="hex">8a4f64</div></div>
  </div>
</body></html>
