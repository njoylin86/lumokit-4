<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Type — Display & Headlines</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--white); }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .row:last-child { border-bottom: none; }
  .meta { width: 110px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); flex-shrink: 0;}
  .sample { color: var(--fg-strong); }
</style></head>
<body>
  <div class="row"><div class="meta">Display / 88<br>Cormorant 400</div>
    <div class="sample" style="font-family:var(--font-serif);font-size:64px;font-weight:400;letter-spacing:-0.02em;line-height:1.05">Patricia Teles</div></div>
  <div class="row"><div class="meta">H1 / 56<br>Cormorant 500</div>
    <div class="sample" style="font-family:var(--font-serif);font-size:48px;font-weight:500;letter-spacing:-0.02em;line-height:1.1">Vacker, varsam tandvård</div></div>
  <div class="row"><div class="meta">H2 / 36<br>Cormorant 500</div>
    <div class="sample" style="font-family:var(--font-serif);font-size:32px;font-weight:500;letter-spacing:-0.01em;line-height:1.2">Digital konsultation</div></div>
</body></html>
