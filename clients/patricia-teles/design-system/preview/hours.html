<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Hours table</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--blush-200); font-family: var(--font-sans);}
  .h4 { font-family: var(--font-sans); font-weight: 500; font-size: 18px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-700); margin: 0 0 16px; }
  .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; color: var(--ink-600); text-transform: uppercase; letter-spacing: 0.06em;}
  .row .day { color: var(--fg-muted);}
</style></head>
<body>
  <div class="h4">Öppetider</div>
  <div class="row"><span class="day">Måndag</span><span>07:30 – 19:30</span></div>
  <div class="row"><span class="day">Tisdag</span><span>07:30 – 19:30</span></div>
  <div class="row"><span class="day">Onsdag</span><span>07:30 – 19:30</span></div>
  <div class="row"><span class="day">Torsdag</span><span>07:30 – 16:30</span></div>
  <div class="row"><span class="day">Fredag</span><span>07:30 – 17:00</span></div>
  <div class="row"><span class="day">Helger</span><span>Stängt</span></div>
</body></html>
