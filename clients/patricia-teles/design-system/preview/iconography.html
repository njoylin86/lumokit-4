<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--white); font-family: var(--font-sans);}
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; text-align: center;}
  .ico { display: flex; flex-direction: column; align-items: center; gap: 8px;}
  .ico svg { stroke: var(--ink-700); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; width: 28px; height: 28px;}
  .name { font-size: 11px; color: var(--fg-muted); letter-spacing: 0.06em;}
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 14px; text-align: center;}
</style></head>
<body>
  <div class="row">
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92Z"/></svg><div class="name">Phone</div></div>
    <div class="ico"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg><div class="name">Mail</div></div>
    <div class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div class="name">Clock</div></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M20 10c0 7-8 12-8 12s-8-5-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg><div class="name">Pin</div></div>
    <div class="ico"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><div class="name">Chevron</div></div>
    <div class="ico"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><div class="name">Arrow</div></div>
  </div>
  <div class="meta">Lucide · 1.5px stroke · rounded caps</div>
</body></html>
