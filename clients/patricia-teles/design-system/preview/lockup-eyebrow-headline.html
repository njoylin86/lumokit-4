<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Eyebrow + headline pattern</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--white); }
  .lock { display: flex; flex-direction: column; gap: 12px; }
  .eyebrow { font-family: var(--font-sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--blush-600); font-weight: 500;}
  h2 { font-family: var(--font-serif); font-weight: 500; font-size: 40px; line-height: 1.1; letter-spacing: -0.02em; margin: 0; color: var(--ink-700);}
  hr { border: none; border-top: 1px dashed var(--border); margin: 22px 0;}
  .small { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);}
</style></head>
<body>
  <div class="lock">
    <span class="eyebrow">Våra behandlingar</span>
    <h2>Vacker, varsam tandvård för hela familjen</h2>
    <span class="small">Eyebrow → Serif headline · the brand's signature lockup</span>
  </div>
</body></html>
