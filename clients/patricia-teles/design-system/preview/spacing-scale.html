<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--white); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 16px; padding: 6px 0;}
  .label { width: 60px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted);}
  .bar { background: var(--blush-300); height: 14px; border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="row"><div class="label">space-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="label">space-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="label">space-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="label">space-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="label">space-5</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="label">space-6</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="label">space-7</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="label">space-8</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="label">space-9</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
</body></html>
