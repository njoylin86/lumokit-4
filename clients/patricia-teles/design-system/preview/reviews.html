<!doctype html>
<html><head>
<meta charset="utf-8"/>
<title>Review stars</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--white); font-family: var(--font-sans); display:flex; flex-direction:column; align-items:center; gap: 12px;}
  .stars { display: flex; gap: 4px; color: #f5c136; font-size: 22px; letter-spacing: 1px;}
  .name { font-weight: 600; color: var(--ink-700);}
  .quote { color: var(--fg); font-size: 14px; max-width: 36ch; text-align: center; line-height: 1.6;}
  .src { font-size: 11px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="stars">★★★★★</div>
  <div class="name">Sirin G</div>
  <div class="quote">Sån himla fin proffsionell personal och tandvård!! Jätte nöjd!</div>
  <div class="src">Google</div>
</body></html>
