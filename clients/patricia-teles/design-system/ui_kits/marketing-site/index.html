<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Patricia Teles · Modern tandvård i Stockholm</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; }
  * { box-sizing: border-box; }
  button { font-family: var(--font-sans); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="TreatmentGrid.jsx"></script>
<script type="text/babel" src="AboutBlock.jsx"></script>
<script type="text/babel" src="DigitalConsultation.jsx"></script>
<script type="text/babel" src="Reviews.jsx"></script>
<script type="text/babel" src="PhotoStrip.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="BookModal.jsx"></script>
<script type="text/babel" src="TreatmentDetail.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const HERO_IMG = "https://images.unsplash.com/photo-1606811971618-4486d14f3f99?w=1600&q=80&auto=format&fit=crop";
const ABOUT_IMG = "https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=900&q=80&auto=format&fit=crop";

const TREATMENTS = [
  { id: 'allman', label: 'Allmän\ntandvård', img: 'https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=600&q=80', body: 'Regelbunden basundersökning, tandstensborttagning och förebyggande vård för hela familjen.', bullets: ['Komplett undersökning','Tandstensborttagning','Förebyggande råd','Barntandvård'], price: '950 kr', title: 'Allmän tandvård' },
  { id: 'akut', label: 'Akut-\ntandvård', img: 'https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=600&q=80', body: 'Plötslig värk eller tandskada? Vi erbjuder akuta tider samma dag.', bullets: ['Tider samma dag','Värkbehandling','Tand­frakturer'], price: '1 200 kr', title: 'Akuttandvård' },
  { id: 'rengoring', label: 'Rengöring', img: 'https://images.unsplash.com/photo-1606811971618-4486d14f3f99?w=600&q=80', body: 'Professionell rengöring med ultraljud, polering och fluorbehandling.', bullets: ['Ultraljud','Airflow-polering','Fluorbehandling'], price: '850 kr', title: 'Rengöring' },
  { id: 'invisalign', label: 'Invisalign –\nosynlig tandställning', img: 'https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=600&q=80', body: 'Räta ut tänderna med osynliga, avtagbara skenor – utan att det syns.', bullets: ['3D-plan','Avtagbara skenor','Uppföljning var 6:e vecka'], price: '38 000 kr', title: 'Invisalign' },
  { id: 'blekning', label: 'Tand-\nblekning', img: 'https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=600&q=80', body: 'Säker blekning utförd av tandläkare med dokumenterat hållbart resultat.', bullets: ['Klinikblekning','Hemblekning','Kombinerad'], price: '3 200 kr', title: 'Tandblekning' },
  { id: 'tandhalsar', label: 'Korrigering av\ntandhalsar', img: 'https://images.unsplash.com/photo-1551884170-09fb70a3a2ed?w=600&q=80', body: 'Återskapar tandkött och tandhalsar med skonsamma behandlingar.', bullets: ['Diagnos','Skonsam korrigering'], price: '4 800 kr', title: 'Tandhalskorrigering' },
  { id: 'icon', label: 'ICON-\nbehandling', img: 'https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=600&q=80', body: 'Behandling av vita fläckar utan att borra. Skonsamt och effektivt.', bullets: ['Borrfri','Snabb behandling'], price: '2 500 kr', title: 'ICON-behandling' },
  { id: 'fasader', label: 'Skal-\nfasader', img: 'https://images.unsplash.com/photo-1629909615184-74f495363b67?w=600&q=80', body: 'Tunna porslinsfasader för ett naturligt vackert leende.', bullets: ['Skissad design','Porslin från Tyskland','10 års garanti'], price: '9 800 kr / tand', title: 'Skalfasader' },
];

const REVIEWS = [
  { name: 'Sirin G', text: 'Sån himla fin proffsionell personal och tandvård!! Jätte nöjd!', source: 'Google' },
  { name: 'Anders L', text: 'Den bästa kliniken jag varit på. Lugnt, kompetent och otroligt fint resultat efter min Invisalign.', source: 'Google' },
  { name: 'Maja K', text: 'Patricia är fantastisk – tar verkligen tid att förklara och får mig att känna mig trygg.', source: 'Google' },
];

const STRIP = [
  'https://images.unsplash.com/photo-1629909615184-74f495363b67?w=400&q=80',
  'https://images.unsplash.com/photo-1606811971618-4486d14f3f99?w=400&q=80',
  'https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=400&q=80',
  'https://images.unsplash.com/photo-1551884170-09fb70a3a2ed?w=400&q=80',
  'https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=400&q=80',
];

function App() {
  const [page, setPage] = useState('hem');
  const [treatment, setTreatment] = useState(null);
  const [booking, setBooking] = useState(false);

  useEffect(() => { window.scrollTo(0, 0); }, [page, treatment]);

  const openTreatment = (t) => { setTreatment(t); setPage('behandling'); };
  const goto = (p) => {
    if (p === 'kontakt') {
      const el = document.getElementById('kontakt');
      if (el && page === 'hem') { el.scrollIntoView({ behavior: 'smooth' }); return; }
    }
    setTreatment(null);
    setPage(p);
  };

  return (
    <>
      <Header currentPage={page} onNavigate={goto} onBook={() => setBooking(true)} />
      {page === 'hem' && (
        <>
          <Hero
            image={HERO_IMG}
            eyebrow="Patricia Teles · DDS"
            title="Vacker, varsam tandvård."
            subtitle="En modern klinik mitt i Stockholm. Vi strävar alltid efter naturligt vackra resultat."
            cta="Boka tid"
            onCta={() => setBooking(true)}
          />
          <TreatmentGrid items={TREATMENTS} onSelect={openTreatment} />
          <AboutBlock image={ABOUT_IMG} onMore={() => goto('om-oss')} />
          <DigitalConsultation />
          <Reviews items={REVIEWS} onAll={() => {}} />
          <PhotoStrip images={STRIP} />
          <Contact />
        </>
      )}
      {page === 'behandling' && treatment && (
        <TreatmentDetail
          treatment={treatment}
          onBack={() => goto('hem')}
          onBook={() => setBooking(true)}
        />
      )}
      {page === 'om-oss' && (
        <div style={{ background: '#fff', padding: '64px 32px 96px', maxWidth: 900, margin: '0 auto' }}>
          <div className="eyebrow" style={{ fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.22em', color: 'var(--blush-600)', marginBottom: 16 }}>Om oss</div>
          <h1 style={{ fontFamily: 'var(--font-serif)', fontWeight: 500, fontSize: 64, letterSpacing: '-0.02em', color: 'var(--ink-700)', margin: '0 0 32px', lineHeight: 1.05 }}>Patricia Teles</h1>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.75, color: 'var(--fg)', maxWidth: '60ch' }}>Patricia Teles är en modern tandläkarklinik mitt i Stockholm. På kliniken arbetar tre tandläkare, en tandhygienist samt två dentalassistenter. Vi har ett stort fokus på estetisk tandvård och stor erfarenhet av tandblekningsbehandlingar, behandling av vita fläckar på tänderna (ICON-behandling), kompositt­uppbyggnad av framtänder och rotytor med mera.</p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.75, color: 'var(--fg)', maxWidth: '60ch' }}>För oss är varje individ unik. Vår ambition är att behandla och förebygga sjukdomar i tänder och munregionen hos våra patienter samt att få fler patienter att trivas med sina tänder och leende genom att förbättra tändernas utseende.</p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.75, color: 'var(--ink-700)', fontWeight: 600 }}>Varmt välkommen till oss.</p>
        </div>
      )}
      {page === 'priser' && (
        <div style={{ background: '#fff', padding: '64px 32px 96px', maxWidth: 900, margin: '0 auto' }}>
          <div className="eyebrow" style={{ fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.22em', color: 'var(--blush-600)', marginBottom: 16 }}>Priser</div>
          <h1 style={{ fontFamily: 'var(--font-serif)', fontWeight: 500, fontSize: 56, letterSpacing: '-0.02em', color: 'var(--ink-700)', margin: '0 0 32px' }}>Prislista</h1>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'var(--font-sans)' }}>
            <tbody>
              {TREATMENTS.map(t => (
                <tr key={t.id} style={{ borderBottom: '1px solid var(--border)' }}>
                  <td style={{ padding: '18px 0', fontSize: 16, color: 'var(--ink-700)' }}>{t.title}</td>
                  <td style={{ padding: '18px 0', fontSize: 16, color: 'var(--fg-muted)', textAlign: 'right', fontFamily: 'var(--font-serif)', fontWeight: 500 }}>Från {t.price}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      <Footer />
      <BookModal open={booking} onClose={() => setBooking(false)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
