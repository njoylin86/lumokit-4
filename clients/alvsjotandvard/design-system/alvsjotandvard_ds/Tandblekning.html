<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tandblekning · Älvsjö Tandvård</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="subpage.jsx"></script>

<script type="text/babel">

function MethodComparison() {
  const methods = [
    {
      name: 'Klinikblekning',
      time: '60–90 min',
      result: 'Upp till 8 nyanser ljusare',
      desc: 'Professionell blekning med hög koncentration under säkert kliniskt förhållande. Snabbast och mest dramatiskt resultat.',
      best: 'Snabbt resultat',
    },
    {
      name: 'Hemblekning',
      time: '10–14 dagar',
      result: '4–6 nyanser ljusare',
      desc: 'Individuellt anpassade skenor gjorda på avgjutning. Lägre koncentration, bärs nattetid. Skonsamt och flexibelt.',
      best: 'Skonsamt & gradvis',
    },
    {
      name: 'Kombination',
      time: '1 besök + 7 nätter',
      result: 'Upp till 10 nyanser ljusare',
      desc: 'Startar med klinikbehandling och avslutas med hemblekning. Ger det bästa möjliga resultatet.',
      best: 'Maximalt resultat',
    },
  ];
  return (
    <section className="section" style={{ background: 'var(--white)' }}>
      <div className="container-wide">
        <div style={{ marginBottom: 56, paddingBottom: 32, borderBottom: '1px solid var(--border)' }}>
          <div className="eyebrow" style={{ marginBottom: 16 }}>Metoder</div>
          <h2 style={{ maxWidth: '22ch' }}>Tre alternativ — vi hjälper dig välja rätt.</h2>
        </div>
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
          gap: 1, background: 'var(--border)',
          border: '1px solid var(--border)',
        }}>
          {methods.map((m, i) => (
            <article key={i} style={{ background: 'var(--white)', padding: '40px 32px', display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <h3 style={{
                  fontFamily: 'var(--font-serif)', fontWeight: 400,
                  fontSize: 28, lineHeight: 1.1, letterSpacing: '-0.02em',
                  color: 'var(--ink-700)', margin: 0,
                }}>{m.name}</h3>
                <span style={{
                  fontSize: 9, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase',
                  color: 'var(--sage-600)', padding: '4px 8px',
                  border: '1px solid var(--border-soft)',
                  whiteSpace: 'nowrap',
                }}>{m.best}</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <div style={{ display: 'flex', gap: 12, alignItems: 'baseline' }}>
                  <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--fg-muted)', minWidth: 48 }}>Tid</span>
                  <span style={{ fontFamily: 'var(--font-serif)', fontSize: 18, color: 'var(--ink-700)', letterSpacing: '-0.01em' }}>{m.time}</span>
                </div>
                <div style={{ display: 'flex', gap: 12, alignItems: 'baseline' }}>
                  <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--fg-muted)', minWidth: 48 }}>Effekt</span>
                  <span style={{ fontFamily: 'var(--font-serif)', fontSize: 18, color: 'var(--sage-600)', letterSpacing: '-0.01em' }}>{m.result}</span>
                </div>
              </div>
              <p style={{ fontSize: 14, lineHeight: 1.65, color: 'var(--ink-500)', margin: 0, paddingTop: 16, borderTop: '1px solid var(--border)' }}>{m.desc}</p>
            </article>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const faq = [
    { question: 'Är tandblekning säkert?', answer: 'Ja, professionell tandblekning utförd av tandläkare är säker. Vi undersöker alltid tänderna och tandköttet innan behandling för att säkerställa att det inte finns karies eller känslig hals som kan förvärras.' },
    { question: 'Hur länge håller resultatet?', answer: 'Med god munhygien och måttlig konsumtion av kaffé, te och rödvin håller resultatet vanligtvis 1–3 år. En kort "touch-up"-kur med hemblekningsskenor kan förlänga resultatet.' },
    { question: 'Kan alla bleka sina tänder?', answer: 'De flesta vuxna kan bleka. Undantag inkluderar gravida och ammande, barn under 18 år, samt personer med aktiv karies eller parodontit — dessa tillstånd måste behandlas först.' },
    { question: 'Påverkar tandblekning kronor och faner?', answer: 'Blekning fungerar bara på naturliga tänder — inte på kronor, faner eller fyllningar. Om du har synliga restaureringar i framtänderna diskuterar vi om eventuellt byte är aktuellt efter blekningsresultatet.' },
  ];

  return (
    <>
      <Header />
      <TreatmentHero
        eyebrow="N° 04 — Tandblekning"
        title={<>Ljusare leende.<br/><span className="italic" style={{ color: 'var(--sage-600)' }}>Snabbt och säkert.</span></>}
        ingress="Professionell tandblekning ger upp till 8–10 nyanser ljusare tänder — utan att skada emaljens struktur. Vi erbjuder klinikblekning, hemblekning och kombinationsmetoden."
        bullets={['Säkert & skonsamt', 'Synligt resultat direkt', 'Individuell anpassning', 'Klinik & hemblekning']}
        img="img/t-tandblekning.jpg"
        stat={{ label: 'Ljusare i snitt', value: '7', sub: 'nyanser med professionell klinikblekning, enligt kliniska studier.' }}
        caption="Tandblekning — alvsjotandvard.se · 08 12 85 45 55"
      />
      <MethodComparison />
      <ContentBlock
        eyebrow="Så fungerar det"
        title="Professionell blekning — inte som butikens produkter."
        html={`<p>Butikens tandblekningsprodukter innehåller vanligtvis under 0,1 % väteperoxid — professionell klinikblekning används med 6–38 %, beroende på metod och protokoll.</p><p>Skillnaden är dramatisk: hemmakit ger subtil effekt över lång tid, medan klinikbehandling kan ge upp till <strong>8 nyanser ljusare tänder på under 90 minuter</strong>.</p><p>Innan blekning genomförs alltid en tandundersökning och tandhygienistbehandling. Ren, fyllningsbehandlad tandyta tar upp blekmedel jämnare och ger ett mer enhetligt resultat.</p>`}
        img="img/rosa-behandlingsstol-instrument.jpg"
      />
      <ContentBlock
        eyebrow="Efter behandlingen"
        title="Råd för att bevara resultatet längre."
        html={`<p>De första 48 timmarna efter blekning är tänderna mer porösa och känsliga för färgpigment. Under denna period bör du undvika:</p><ul style="padding-left: 0; list-style: none; display: flex; flex-direction: column; gap: 10px; margin: 16px 0;"><li style="display: flex; gap: 12px; align-items: baseline; font-size: 15px; color: var(--ink-500)"><span style="color: var(--sage-600); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; min-width: 24px;">→</span> Kaffe, te och rödvin</li><li style="display: flex; gap: 12px; align-items: baseline; font-size: 15px; color: var(--ink-500)"><span style="color: var(--sage-600); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; min-width: 24px;">→</span> Mörka såser och bär</li><li style="display: flex; gap: 12px; align-items: baseline; font-size: 15px; color: var(--ink-500)"><span style="color: var(--sage-600); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; min-width: 24px;">→</span> Tobak och rökning</li></ul><p>Använd fluortandkräm och fortsätt med regelbunden tandhygien. Våra hemblekningsskenor kan användas för "touch-up" 1–2 gånger per år för att bibehålla resultatet.</p>`}
        img="img/clinic-detail-1.jpg"
        imgRight={true}
        bg="var(--cream)"
        ctaLabel="Boka blekningskonsultation"
      />
      <FAQ items={faq} title="Vanliga frågor om tandblekning." />
      <CTAStrip
        title="Boka en blekningskonsultation"
        sub="Vi bedömer dina tänder och rekommenderar rätt metod för dig. Ring 08-12 85 45 55 eller boka online."
      />
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
