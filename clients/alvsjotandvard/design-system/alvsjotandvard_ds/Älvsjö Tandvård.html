<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Älvsjö Tandvård · Modern tandvård i Stockholm</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="hero.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "hero": "bleed"
}/*EDITMODE-END*/;

const DENSITIES = {
  compact: 0.85,
  regular: 1,
  airy: 1.18,
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty('--density', String(DENSITIES[t.density] ?? 1));
  }, [t.density]);

  const hero =
    t.hero === 'bleed' ? <HeroBleed /> :
    t.hero === 'editorial' ? <HeroEditorial /> :
    <HeroStats />;

  return (
    <>
      <Header />
      {hero}
      <Treatments />
      <Reviews />
      <About />
      <EmergencyBanner />
      <Team />
      <PhotoTour />
      <Booking />
      <Footer />

      <TweaksPanel>
        <TweakSection label="Hero" />
        <TweakRadio
          label="Variant"
          value={t.hero}
          options={[
            { value: 'stats', label: 'Stats' },
            { value: 'bleed', label: 'Bild' },
            { value: 'editorial', label: 'Editorial' },
          ]}
          onChange={(v) => setTweak('hero', v)}
        />
        <TweakSection label="Densitet" />
        <TweakRadio
          label="Vertikal rytm"
          value={t.density}
          options={[
            { value: 'compact', label: 'Tät' },
            { value: 'regular', label: 'Normal' },
            { value: 'airy', label: 'Luftig' },
          ]}
          onChange={(v) => setTweak('density', v)}
        />
        <div style={{ fontSize: 10.5, color: 'rgba(31,31,31,0.5)', padding: '8px 4px 0', lineHeight: 1.45 }}>
          Färger och typografi följer Patricia Teles Design System (blush · ink · Cormorant Garamond + Outfit).
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
