<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Barnspecialist · Älvsjö Pedodonti</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="subpage.jsx"></script>

<script type="text/babel">
function FactStrip() {
  const items = [
    { k: '19 år', v: 'Gratis tandvård för barn och unga upp till 19 år.' },
    { k: '23 år', v: 'Specialistvård via Älvsjö Pedodonti upp till 23 år.' },
    { k: 'Region', v: 'Vi arbetar på uppdrag av Region Stockholm.' },
    { k: 'Libretto', v: 'Vi tar emot remisser via Libretto.' },
  ];
  return (
    <section className="section" style={{ background: 'var(--white)' }}>
      <div className="container-wide">
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)',
          gap: 1, background: 'var(--border)',
          border: '1px solid var(--border)',
        }}>
          {items.map((it, i) => (
            <div key={i} style={{ background: 'var(--white)', padding: '36px 28px' }}>
              <div style={{
                fontFamily: 'var(--font-serif)', fontWeight: 300,
                fontSize: 48, lineHeight: 1, letterSpacing: '-0.03em',
                color: 'var(--ink-700)', marginBottom: 14,
              }}>{it.k}</div>
              <div style={{ fontSize: 14, color: 'var(--ink-500)', lineHeight: 1.5 }}>{it.v}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const faq = [
    { question: 'Vilka kan få specialisttandvård hos Älvsjö Pedodonti?', answer: 'Älvsjö Pedodonti är en specialistklinik för barn och unga upp till 23 år. Vi tar emot remisser via Libretto och arbetar på uppdrag av Region Stockholm för att erbjuda specialistvård.' },
    { question: 'Vad gör ni om mitt barn är rädd för tandläkaren?', answer: 'Vi möter rädda barn med extra tålamod och anpassad omsorg. Vårt team är specialiserat på psykologisk omvårdnad och erbjuder vid behov lustgas, lugnande medel eller narkos för en trygg upplevelse.' },
    { question: 'Kostar tandvården något för barn?', answer: 'Nej, hos Älvsjö Tandvård är all tandvård alltid gratis för barn och ungdomar upp till 19 år. Det gäller både allmäntandvård och specialisttandvård på remiss.' },
  ];

  return (
    <>
      <Header />
      <PageHero
        eyebrow="N° 03 — Barnspecialist · Pedodonti"
        title={<>Trygg tandvård <span className="italic" style={{ color: 'var(--sage-600)' }}>från första tanden.</span></>}
        ingress="På Älvsjö Pedodonti möter vi barn och unga upp till 23 år med specialistkompetens. Vi skapar trygga och positiva tandvårdsupplevelser, anpassade efter varje individs behov och känslor."
        bullets={['Specialist för barn', 'Trygga upplevelser', 'Korta väntetider', 'Region Stockholm']}
      />
      <FactStrip />
      <ContentBlock
        eyebrow="Älvsjö Pedodonti"
        title="Anpassad specialistvård med omtanke."
        html={`<p>Älvsjö Pedodonti är vår specialistklinik för <strong>barn och unga upp till 23 års ålder</strong>. Vi arbetar på uppdrag av Region Stockholm och tar emot remisser via Libretto för att säkerställa expertis och trygg vård för ditt barn.</p><p>Vårt specialistteam fokuserar på att stärka barns positiva upplevelse av tandvård genom avancerad psykologisk omvårdnad. Vi anpassar behandlingen efter varje barns unika behov. För en trygg upplevelse erbjuder vi <strong>lustgas, lugnande medel (Midazolam) och i särskilda fall narkosbehandling</strong>. Tandvård är alltid <strong>gratis för barn och ungdomar upp till 19 år</strong>.</p>`}
        img="img/barnhorna-bokhylla-leksaker.jpg"
        ctaLabel="Skicka remiss"
        ctaHref="#"
      />
      <FAQ items={faq} title="Frågor från föräldrar." />
      <CTAStrip
        title="Behöver ditt barn specialistvård?"
        sub="Vi tar emot remisser via Libretto. Är du osäker — ring oss på 08-12 85 45 55 så hjälper vi dig vidare."
      />
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
