<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tandfasader · Veneers · Älvsjö Tandvård</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="subpage.jsx"></script>

<script type="text/babel">

function UseCasesGrid() {
  const cases = [
    { title: 'Missfärgade tänder', desc: 'Inre missfärgningar som inte bleknings-behandling kan nå — t.ex. från tetracyklin eller trauma.' },
    { title: 'Ojämna tänder', desc: 'Tänder med oregelbundna kanter, frakturer eller slitna ytor. Faner ger enhetlig form och storlek.' },
    { title: 'Mellanrum', desc: 'Luckorna stängs utan tandreglering — ett populärt alternativ för vuxna som vill ha snabbt resultat.' },
    { title: 'Lite sneda tänder', desc: 'Lindriga positionsavvikelser kan döljas med estetiskt anpassade faner — utan skenor eller byglar.' },
    { title: 'Korta eller avbrutna', desc: 'Tänder som slitits ned av tandgnissling eller brottsskador kan byggas upp till rätt längd och form.' },
    { title: 'Generellt leende', desc: 'Smile design — en komplett estetisk förändring av 6–10 synliga tänder för ett harmoniskt helhetsintryck.' },
  ];
  return (
    <section className="section" style={{ background: 'var(--white)' }}>
      <div className="container-wide">
        <div style={{ marginBottom: 56, paddingBottom: 32, borderBottom: '1px solid var(--border)' }}>
          <div className="eyebrow" style={{ marginBottom: 16 }}>Indikationer</div>
          <h2 style={{ maxWidth: '22ch' }}>Vad kan tandfasader rätta till?</h2>
        </div>
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
          gap: 1, background: 'var(--border)',
          border: '1px solid var(--border)',
        }}>
          {cases.map((c, i) => (
            <article key={i} style={{ background: 'var(--white)', padding: '40px 32px', display: 'flex', flexDirection: 'column', gap: 12 }}>
              <h3 style={{
                fontFamily: 'var(--font-serif)', fontWeight: 400,
                fontSize: 24, lineHeight: 1.2, letterSpacing: '-0.02em',
                color: 'var(--ink-700)', margin: 0,
              }}>{c.title}</h3>
              <p style={{ fontSize: 14, lineHeight: 1.65, color: 'var(--ink-500)', margin: 0 }}>{c.desc}</p>
            </article>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const faq = [
    { question: 'Hur länge håller tandfasader?', answer: 'Porslinsfaner håller vanligtvis 10–20 år med god munhygien och regelbundna kontroller. Komposit-veneers håller kortare (5–8 år) men är billigare och enklare att ersätta.' },
    { question: 'Tar bort faner bort något av min naturliga tand?', answer: 'Traditionella faner kräver att 0,3–0,5 mm av emaljet slipas bort — detta är permanent. "No-prep" faner (Ultra-thin) kräver minimal eller ingen bortslipning och är ett alternativ för lämpliga fall.' },
    { question: 'Kan man äta normalt med faner?', answer: 'Ja — med rätt omsorg. Undvik att bita i hårda föremål (is, naglar, skaldjur med skal). Använd skyddsbit om du gnisslar tänder nattetid. I övrigt äter du precis som vanligt.' },
    { question: 'Vad kostar tandfasader?', answer: 'Priset varierar beroende på antal tänder och material. Porslinsfaner kostar från 8 000–12 000 kr per tand. Komposit-veneers från 3 500–6 000 kr. Vi ger dig ett detaljerat kostnadsförslag efter konsultationen.' },
  ];

  return (
    <>
      <Header />
      <TreatmentHero
        eyebrow="N° 05 — Tandfasader · Veneers"
        title={<>Ditt drömleende —<br/><span className="italic" style={{ color: 'var(--sage-600)' }}>skräddarsytt.</span></>}
        ingress="Tandfasader (veneers) är tunna porslinsskal som limmas på tandens framsida. De döljer missfärgningar, ojämnheter och mellanrum — och ger ett harmoniskt, naturligt leende."
        bullets={['Porslin & komposit', 'Digitalt smile design', 'Långvarig estetik', 'Minimal preparation']}
        img="img/t-tandfasader.jpg"
        stat={{ label: 'Hållbarhet', value: '15–20', sub: 'år för porslinsfaner med god munhygien.' }}
        caption="Tandfasader — alvsjotandvard.se · 08 12 85 45 55"
      />
      <UseCasesGrid />
      <ContentBlock
        eyebrow="Material & teknik"
        title="Porslin eller komposit — vi rekommenderar rätt val."
        html={`<p>Vi arbetar med två huvudsakliga typer av tandfasader:</p><p><strong>Porslinsfaner</strong> är det estetiskt överlägsnare valet — extremt tunna (0,3–0,5 mm) keramikskivor som tillverkas individuellt av tandtekniker. De imiterar emalje-ljusets genomskinlighet och missfärgas inte med åren. Hållbarhet: 15–20+ år.</p><p><strong>Komposit-veneers</strong> byggs upp direkt på tanden vid ett besök utan avgjutning. Snabbare och mer kostnadseffektivt, men kräver polering och byte oftare. Hållbarhet: 5–8 år.</p><p>Vi rekommenderar metod efter dina specifika estetiska mål, ekonomiska förutsättningar och tandsituation — alltid med digital visualisering (smile design) så att du ser resultatet innan vi påbörjar.</p>`}
        img="img/tandlakare-i-alvsjo-2.jpg"
      />
      <ContentBlock
        eyebrow="Processen"
        title="Från första konsultation till färdigt leende — tre steg."
        html={`<ul style="padding-left: 0; list-style: none; display: flex; flex-direction: column; gap: 20px; margin: 0;"><li style="display: flex; gap: 16px; align-items: baseline;"><span style="font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.22em; color: var(--sage-600); text-transform: uppercase; flex-shrink: 0; min-width: 32px;">01</span><div><strong style="color: var(--ink-700); display: block; margin-bottom: 4px; font-size: 16px;">Konsultation & smile design</strong><span style="font-size: 14px; color: var(--ink-500); line-height: 1.5;">Vi fotograferar, tar avgjutningar och skapar en digital preview av ditt nya leende. Du godkänner designen innan vi fortsätter.</span></div></li><li style="display: flex; gap: 16px; align-items: baseline;"><span style="font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.22em; color: var(--sage-600); text-transform: uppercase; flex-shrink: 0; min-width: 32px;">02</span><div><strong style="color: var(--ink-700); display: block; margin-bottom: 4px; font-size: 16px;">Preparering & avgjutning</strong><span style="font-size: 14px; color: var(--ink-500); line-height: 1.5;">Liten mängd emalj slipas av. Digitala eller fysiska avtryck skickas till tandtekniker. Temporära faner sätts in under väntetiden.</span></div></li><li style="display: flex; gap: 16px; align-items: baseline;"><span style="font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.22em; color: var(--sage-600); text-transform: uppercase; flex-shrink: 0; min-width: 32px;">03</span><div><strong style="color: var(--ink-700); display: block; margin-bottom: 4px; font-size: 16px;">Inlimning & finish</strong><span style="font-size: 14px; color: var(--ink-500); line-height: 1.5;">De färdiga fanerna anpassas exakt och limmas permanent. Vi kontrollerar bett och finish — du lämnar kliniken med ditt nya leende.</span></div></li></ul>`}
        img="img/clinic-detail-2.jpg"
        imgRight={true}
        bg="var(--cream)"
        ctaLabel="Boka smile design"
      />
      <FAQ items={faq} title="Vanliga frågor om tandfasader." />
      <CTAStrip
        title="Boka en konsultation om tandfasader"
        sub="Vi skapar en digital preview av ditt leende — utan kostnad vid konsultationsbesöket. Ring 08-12 85 45 55."
      />
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
